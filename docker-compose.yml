services:
  release-agent:
    build: .
    ports:
      - "${PORT:-3000}:3000"
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:3000/health').raise_for_status()"]
      interval: 30s
      timeout: 5s
      retries: 3

  # Optional: Redis for future caching support
  # redis:
